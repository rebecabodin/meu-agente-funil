name: 🚀 Atualizar Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'   # A cada 30 minutos
  push:
    branches: [ main ]        # Também roda a cada push
  workflow_dispatch:           # Permite rodar manualmente

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: pip install -r requirements.txt

      - name: 🔑 Criar arquivo de credenciais Google
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json

      - name: 📊 Gerar dados do dashboard
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python generate_static.py

      - name: 🗑️ Remover credenciais temporárias
        run: rm -f credentials.json

      - name: 💾 Commit e push do data.json atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force docs/data.json
          git diff --cached --quiet || git commit -m "chore: atualiza métricas do funil [skip ci]"
          git push
